name: "Setup Python Environment"
description: "Set up Python environment for the given Python version"

inputs:
  python-version:
    description: "Python version to use"
    required: true
    default: "3.12"
  uv-version:
    description: "uv version to use"
    required: true
    default: "0.8.4"


runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      id: setup-uv
      with:
        version: ${{ inputs.uv-version }}
        enable-cache: 'true'
        cache-suffix: ${{ inputs.python-version }}
        cache-dependency-glob: |
          pyproject.toml
          uv.lock
    - name: Debug Python and uv
      shell: bash
      run: |
        echo "python from PATH:"
        which python
        python --version

        echo "uv version:"
        uv --version

        echo "project files:"
        ls -la
        test -f pyproject.toml && echo "pyproject.toml present"
        test -f uv.lock && echo "uv.lock present"

        echo "lockfile check:"
        uv lock --check
    - name: Install Python dependencies
      run: |
        uv sync --all-groups --frozen
        uv pip list
      shell: bash
