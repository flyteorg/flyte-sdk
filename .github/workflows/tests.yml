name: Main

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: make unit_test

      - name: Upload coverage reports to Codecov with GitHub Action on Python 3.11
        uses: codecov/codecov-action@v4
        if: ${{ matrix.python-version == '3.11' }}

  discover-plugins:
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.find.outputs.plugins }}
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Find plugins with tests
        id: find
        run: |
          # Auto-discover all plugins that have a tests/ directory, including nested
          # sub-packages up to 3 levels deep (e.g. plugins/agents/core, plugins/agents/langgraph).
          # Exclude 'agents/hermes' — it requires Python >= 3.11 and has its own dedicated job.
          plugins=$(find plugins -mindepth 1 -maxdepth 3 -type d -exec test -d '{}/tests' \; -print | sed 's#^plugins/##' | grep -v '^agents/hermes$' | sort | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "plugins=$plugins" >> "$GITHUB_OUTPUT"

  unit-tests-plugins:
    needs: discover-plugins
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: ${{ fromJson(needs.discover-plugins.outputs.plugins) }}
        python-version: ["3.12"]
      fail-fast: false
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        env:
          FLYTE_PLUGIN: plugins/${{ matrix.plugin }}
        run: make unit_test_plugins

  unit-tests-hermes:
    # Hermes agent requires Python >= 3.11
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run hermes agent tests
        env:
          FLYTE_PLUGIN: plugins/agents/hermes
        run: make unit_test_plugins
